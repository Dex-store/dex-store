<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>DEX Trading | منصة الخدمات الرقمية الاحترافية</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root {
      /* لوحة ألوان عصرية وداكنة */
      --bg: #030712;
      --card-bg: #111827;
      --accent: #3b82f6;
      --accent-glow: rgba(59, 130, 246, 0.5);
      --text-main: #f9fafb;
      --text-muted: #9ca3af;
      --success: #10b981;
      --danger: #ef4444;
      --border: rgba(255, 255, 255, 0.1);
      --radius-lg: 20px;
      --radius-md: 12px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; scroll-behavior: smooth; }
    
    body {
      margin: 0;
      font-family: 'Tajawal', 'Inter', sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      overflow-x: hidden;
      line-height: 1.6;
    }

    /* تحسين الخلفية بتأثير الـ Mesh Gradient */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: 
        radial-gradient(circle at 15% 15%, rgba(59, 130, 246, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 85% 85%, rgba(16, 185, 129, 0.1) 0%, transparent 40%);
      z-index: -1;
    }

    .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

    /* هيدر احترافي شفاف */
    .navbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(3, 7, 18, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 15px 0;
    }

    .nav-content {
      display: flex; justify-content: space-between; align-items: center;
    }

    .logo-area { display: flex; align-items: center; gap: 12px; }
    .logo-icon {
      background: linear-gradient(135deg, var(--accent), #1d4ed8);
      width: 40px; height: 40px; border-radius: var(--radius-md);
      display: grid; place-items: center; font-weight: 900;
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .nav-links { display: flex; gap: 20px; }
    .nav-links a { 
      color: var(--text-muted); font-weight: 700; font-size: 0.9rem;
      transition: var(--transition);
    }
    .nav-links a:hover { color: var(--accent); }

    /* تحسين بطاقات المنتجات */
    .products-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 25px; margin-top: 40px;
    }

    .product-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }

    .product-card:hover {
      transform: translateY(-10px);
      border-color: var(--accent);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .price-tag {
      font-size: 1.5rem; font-weight: 900; color: var(--accent);
      display: flex; align-items: center; gap: 5px;
    }

    /* زر الأكشن */
    .btn-primary {
      background: var(--accent); color: white; border: none;
      padding: 12px 24px; border-radius: var(--radius-md);
      font-weight: 700; cursor: pointer; transition: var(--transition);
      display: flex; align-items: center; gap: 8px; justify-content: center;
      width: 100%;
    }

    .btn-primary:hover { background: #2563eb; transform: scale(1.02); }

    /* سلة المشتريات الجانبية */
    .cart-drawer {
      position: fixed; top: 0; left: 0; width: 400px; height: 100%;
      background: var(--card-bg); z-index: 1000;
      transform: translateX(-100%); transition: var(--transition);
      padding: 30px; box-shadow: 20px 0 50px rgba(0,0,0,0.5);
    }
    [dir="rtl"] .cart-drawer { left: auto; right: 0; transform: translateX(100%); }
    .cart-drawer.active { transform: translateX(0); }

    /* قسم الهيرو (Hero Section) */
    .hero { text-align: center; padding: 80px 0; }
    .hero h1 { font-size: 3.5rem; margin-bottom: 20px; letter-spacing: -2px; }
    .hero p { color: var(--text-muted); font-size: 1.2rem; max-width: 600px; margin: 0 auto 30px; }

    /* التنبيهات (Toast) */
    .toast-container {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      z-index: 10000;
    }
    .toast {
      background: var(--accent); color: white; padding: 12px 25px;
      border-radius: 50px; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      margin-top: 10px; animation: slideUp 0.3s ease;
    }

    @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* تحسين الفورم */
    input, select, textarea {
      width: 100%; background: #0f172a; border: 1px solid var(--border);
      padding: 15px; border-radius: var(--radius-md); color: white;
      margin-bottom: 15px; outline: none; transition: var(--transition);
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }

  </style>
</head>
<body>

  <header class="navbar">
    <div class="container nav-content">
      <div class="logo-area">
        <div class="logo-icon">DX</div>
        <div style="font-weight: 900; font-size: 1.2rem;">DEX TRADING</div>
      </div>
      <nav class="nav-links">
        <a href="#home">الرئيسية</a>
        <a href="#products">المنتجات</a>
        <a href="#checkout">الدفع</a>
        <div style="position: relative; cursor: pointer;" onclick="toggleCart()">
          <i data-lucide="shopping-bag"></i>
          <span id="cart-count" style="position: absolute; top:-10px; right:-10px; background:var(--danger); font-size:10px; padding:2px 6px; border-radius:50px;">0</span>
        </div>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero" id="home">
      <div class="container">
        <h1>احتراف التداول يبدأ من هنا</h1>
        <p>مجموعة مختارة من الأدوات البرمجية، الكورسات الاحترافية، وخدمات شحن الأرصدة لدعم رحلتك في الأسواق المالية.</p>
        <div style="display: flex; gap: 15px; justify-content: center;">
          <a href="#products" class="btn-primary" style="width: auto;">تصفح الخدمات <i data-lucide="arrow-left"></i></a>
        </div>
      </div>
    </section>

    <section class="container" id="products">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2>الخدمات المتاحة</h2>
        <div style="display: flex; gap: 10px;">
           <button class="btn-primary" style="background: #1e293b; width: auto;" onclick="filterProducts('all')">الكل</button>
           <button class="btn-primary" style="background: #1e293b; width: auto;" onclick="filterProducts('Bots')">البوتات</button>
           <button class="btn-primary" style="background: #1e293b; width: auto;" onclick="filterProducts('Courses')">الكورسات</button>
        </div>
      </div>
      
      <div id="products-grid" class="products-grid">
        </div>
    </section>

    <section class="container" id="checkout" style="margin-top: 100px; padding-bottom: 100px;">
      <div class="product-card" style="max-width: 800px; margin: 0 auto;">
        <h2>إتمام الطلب</h2>
        <form id="main-order-form">
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <input type="text" placeholder="الاسم الكامل" required>
            <input type="text" placeholder="رقم الهاتف (واتساب)" required>
          </div>
          <select required id="pay-method-select">
            <option value="">اختر طريقة الدفع</option>
            <option value="BOK">بنك الخرطوم (8108407)</option>
            <option value="Binance">Binance Pay (850037703)</option>
            <option value="Crypto">Ethereum ERC20</option>
          </select>
          <input type="text" placeholder="رقم العملية / TxID" required>
          <textarea placeholder="ملاحظات إضافية (اختياري)"></textarea>
          <button type="submit" class="btn-primary">توليد الطلب وإرساله عبر واتساب <i data-lucide="send"></i></button>
        </form>
      </div>
    </section>
  </main>

  <aside id="cart-drawer" class="cart-drawer">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
      <h3>سلة المشتريات</h3>
      <i data-lucide="x" onclick="toggleCart()" style="cursor: pointer;"></i>
    </div>
    <div id="cart-items-list">
      </div>
    <div style="margin-top: auto; border-top: 1px solid var(--border); padding-top: 20px;">
      <div style="display: flex; justify-content: space-between; font-weight: 900; font-size: 1.2rem;">
        <span>الإجمالي:</span>
        <span id="cart-total-price">0.00 USD</span>
      </div>
      <a href="#checkout" class="btn-primary" style="margin-top: 20px;" onclick="toggleCart()">التوجه للدفع</a>
    </div>
  </aside>

  <div id="toast-container" class="toast-container"></div>

  <script>
    // بيانات المنتجات
    const PRODUCTS = [
      { id: "g_bot", category: "Bots", name: "بوت تداول الذهب (Gold Bot)", price: 50, desc: "خوارزمية ذكية مخصصة لمعدن الذهب XAUUSD." },
      { id: "c_ict", category: "Courses", name: "كورس ICT الاحترافي", price: 10, desc: "تعلم مفاهيم صناع السوق والسيولة." },
      { id: "ex_acc", category: "Exness", name: "إنشاء وتوثيق حساب Exness", price: 10, desc: "إعداد كامل وتخطي عقبات التوثيق." },
      { id: "usdt_top", category: "USDT", name: "شحن رصيد USDT", price: 10, desc: "توفير سيولة رقمية سريعة ومضمونة." }
    ];

    let cart = [];

    // تهيئة الأيقونات
    lucide.createIcons();

    // عرض المنتجات
    function renderProducts(filter = 'all') {
      const grid = document.getElementById('products-grid');
      grid.innerHTML = '';
      
      const filtered = filter === 'all' ? PRODUCTS : PRODUCTS.filter(p => p.category === filter);
      
      filtered.forEach(p => {
        grid.innerHTML += `
          <div class="product-card">
            <div style="color: var(--accent); margin-bottom: 10px;"><i data-lucide="package"></i></div>
            <h3 style="margin: 10px 0;">${p.name}</h3>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 20px;">${p.desc}</p>
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <span class="price-tag">${p.price} <small style="font-size: 12px; color:white">USD</small></span>
              <button class="btn-primary" style="width: auto; padding: 8px 15px;" onclick="addToCart('${p.id}')">
                <i data-lucide="plus"></i>
              </button>
            </div>
          </div>
        `;
      });
      lucide.createIcons();
    }

    function addToCart(id) {
      const product = PRODUCTS.find(p => p.id === id);
      cart.push(product);
      updateCartUI();
      showToast(`تمت إضافة ${product.name} للسلة`);
    }

    function updateCartUI() {
      const list = document.getElementById('cart-items-list');
      const count = document.getElementById('cart-count');
      const total = document.getElementById('cart-total-price');
      
      count.innerText = cart.length;
      list.innerHTML = '';
      let sum = 0;

      cart.forEach((item, index) => {
        sum += item.price;
        list.innerHTML += `
          <div style="display: flex; justify-content: space-between; margin-bottom: 15px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px;">
            <div>
              <div style="font-weight: 700; font-size: 0.8rem;">${item.name}</div>
              <div style="color: var(--accent); font-size: 0.8rem;">${item.price} USD</div>
            </div>
            <i data-lucide="trash-2" style="color: var(--danger); cursor: pointer; width: 16px;" onclick="removeFromCart(${index})"></i>
          </div>
        `;
      });

      total.innerText = `${sum.toFixed(2)} USD`;
      lucide.createIcons();
    }

    function removeFromCart(index) {
      cart.splice(index, 1);
      updateCartUI();
    }

    function toggleCart() {
      document.getElementById('cart-drawer').classList.toggle('active');
    }

    function showToast(msg) {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerText = msg;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function filterProducts(cat) {
      renderProducts(cat);
    }

    // معالجة الطلب
    document.getElementById('main-order-form').onsubmit = function(e) {
      e.preventDefault();
      if(cart.length === 0) {
        showToast("السلة فارغة!");
        return;
      }
      
      const inputs = this.querySelectorAll('input, select, textarea');
      const name = inputs[0].value;
      const phone = inputs[1].value;
      const method = inputs[2].value;
      const txid = inputs[3].value;
      
      let orderText = `*طلب جديد من DEX Trading*\n`;
      orderText += `--------------------------\n`;
      orderText += `العميل: ${name}\nالهاتف: ${phone}\nالدفع: ${method}\nالعملية: ${txid}\n`;
      orderText += `--------------------------\n`;
      orderText += `المنتجات:\n`;
      cart.forEach(item => orderText += `- ${item.name} (${item.price} USD)\n`);
      orderText += `--------------------------\n`;
      orderText += `*الإجمالي: ${document.getElementById('cart-total-price').innerText}*`;

      window.open(`https://wa.me/249112550653?text=${encodeURIComponent(orderText)}`, '_blank');
    };

    renderProducts();
  </script>
</body>
</html>
